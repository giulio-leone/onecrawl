[package]
name = "onecrawl-benchmark"
version.workspace = true
edition.workspace = true
publish = false

[[bin]]
name = "onecrawl-benchmark"
path = "src/main.rs"

[features]
default = []
playwright = ["onecrawl-cdp/playwright"]

[dependencies]
onecrawl-core = { path = "../onecrawl-core" }
onecrawl-crypto = { path = "../onecrawl-crypto" }
onecrawl-parser = { path = "../onecrawl-parser" }
onecrawl-storage = { path = "../onecrawl-storage" }
onecrawl-cdp = { path = "../onecrawl-cdp" }
tokio = { workspace = true, features = ["full"] }
tempfile = { workspace = true }
