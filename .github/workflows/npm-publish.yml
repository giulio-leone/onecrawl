name: npm Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

defaults:
  run:
    working-directory: packages/onecrawl-rust

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            setup: |
              sudo apt-get update
              sudo apt-get install -y gcc-aarch64-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            setup: |
              sudo apt-get update
              sudo apt-get install -y musl-tools
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Setup
        if: matrix.setup
        run: ${{ matrix.setup }}
      - name: Install dependencies
        working-directory: packages/onecrawl-rust/bindings/napi
        run: npm ci
      - name: Build
        working-directory: packages/onecrawl-rust/bindings/napi
        run: npx napi build --release --platform --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: packages/onecrawl-rust/bindings/napi/*.node

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          path: packages/onecrawl-rust/bindings/napi/artifacts
      - name: Move artifacts
        working-directory: packages/onecrawl-rust/bindings/napi
        run: |
          ls -la artifacts/
          for dir in artifacts/bindings-*/; do
            cp "$dir"*.node . 2>/dev/null || true
          done
          ls -la *.node
      - name: Publish to npm
        working-directory: packages/onecrawl-rust/bindings/napi
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to GitHub Packages
        working-directory: packages/onecrawl-rust/bindings/napi
        run: |
          echo "@onecrawl:registry=https://npm.pkg.github.com" >> .npmrc
          npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
