[workspace]
resolver = "2"
members = [
    "crates/onecrawl-core",
    "crates/onecrawl-crypto",
    "crates/onecrawl-parser",
    "crates/onecrawl-storage",
    "crates/onecrawl-cdp",
    "crates/onecrawl-cli-rs",
    "bindings/napi",
    "bindings/python",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/giulio-leone/onecrawl"
authors = ["Giulio Leone <giulio-leone@users.noreply.github.com>"]

[workspace.dependencies]
# Core
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

# Crypto
ring = "0.17"
base64 = "0.22"
data-encoding = "2"
rand = "0.9"
zeroize = { version = "1", features = ["derive"] }

# Parser
lol_html = "2"
scraper = "0.22"

# Storage
sled = "0.34"

# Browser (CDP)
chromiumoxide = { version = "0.8", features = ["tokio-runtime"] }
futures = "0.3"

# CLI
clap = { version = "4", features = ["derive", "env", "color"] }
colored = "3"
hex = "0.4"

# Testing
pretty_assertions = "1"
tempfile = "3"

# NAPI bindings
napi = { version = "3", default-features = false, features = ["napi8", "async", "serde-json"] }
napi-derive = "3"
napi-build = "2"

# PyO3 bindings
pyo3 = { version = "0.24", features = ["extension-module"] }
