[workspace]
resolver = "2"
members = [
    "crates/onecrawl-core",
    "crates/onecrawl-crypto",
    "crates/onecrawl-parser",
    "crates/onecrawl-storage",
    "crates/onecrawl-cdp",
    "crates/onecrawl-cli-rs",
    "crates/onecrawl-mcp-rs",
    "crates/onecrawl-server",
    "crates/onecrawl-e2e",
    "crates/onecrawl-benchmark",
    "bindings/napi",
    "bindings/python",
]

[workspace.package]
version = "1.0.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/giulio-leone/onecrawl"
authors = ["Giulio Leone <giulio-leone@users.noreply.github.com>"]

[workspace.dependencies]
# Core
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

# Crypto
ring = "0.17"
base64 = "0.22"
data-encoding = "2"
rand = "0.9"
zeroize = { version = "1", features = ["derive"] }

# Parser
lol_html = "2"
scraper = "0.22"

# Storage
sled = "0.34"

# Browser (CDP)
chromiumoxide = { version = "0.8", features = ["tokio-runtime"] }
futures = "0.3"
playwright = { package = "playwright-rs", version = "0.8" }

# CLI
clap = { version = "4", features = ["derive", "env", "color"] }
colored = "3"
hex = "0.4"

# MCP
rmcp = { version = "0.5", features = ["server", "transport-io", "transport-sse-server"] }
schemars = "0.8"
tracing-subscriber = "0.3"

# Testing
pretty_assertions = "1"
tempfile = "3"
assert_cmd = "2"
predicates = "3"
serial_test = "3"
reqwest = { version = "0.12", features = ["json"] }
port_check = "0.2"

# NAPI bindings
napi = { version = "3", default-features = false, features = ["napi8", "async", "serde-json"] }
napi-derive = "3"
napi-build = "2"

# PyO3 bindings
pyo3 = { version = "0.24", features = ["extension-module"] }

# ── Build profiles ──────────────────────────────────────────
[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"

[profile.dev]
opt-level = 0
debug = true

[profile.dev.package."*"]
opt-level = 2
