[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "onecrawl"
version = "1.0.0"
description = "High-performance browser automation — Rust core via PyO3"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [{name = "Giulio Leone"}]
keywords = ["browser", "automation", "cdp", "scraping", "stealth"]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Operating System :: Microsoft :: Windows",
]

[project.urls]
Repository = "https://github.com/giulio-leone/onecrawl"

[tool.maturin]
features = ["pyo3/extension-module"]
module-name = "onecrawl"
