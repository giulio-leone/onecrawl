name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/onecrawl-rust/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/onecrawl-rust/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/onecrawl-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/onecrawl-rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings || true
      - name: Format check
        run: cargo fmt --all -- --check || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: packages/onecrawl-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/onecrawl-rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests
        run: cargo test --workspace

  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: onecrawl-cli-rs
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: onecrawl-cli-rs
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: onecrawl-cli-rs
    defaults:
      run:
        working-directory: packages/onecrawl-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/onecrawl-rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release
        run: cargo build --release --package onecrawl-cli-rs --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onecrawl-${{ matrix.target }}
          path: packages/onecrawl-rust/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  build-napi:
    name: Build NAPI
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: packages/onecrawl-rust/bindings/napi
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onecrawl-napi
          path: packages/onecrawl-rust/bindings/napi/*.node
