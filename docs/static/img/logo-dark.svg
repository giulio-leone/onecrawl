  <path d="M32 12 L38 20 L32 28" fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Spider body -->
  <ellipse cx="20" cy="19" rx="3.2" ry="4" fill="#e0e7ff"/>
  <circle cx="20" cy="14" r="2.2" fill="#e0e7ff"/>
  <!-- Eyes -->
  <circle cx="19" cy="13.5" r="0.6" fill="#f97316"/>
  <circle cx="21" cy="13.5" r="0.6" fill="#f97316"/>
  <!-- 8 legs: 4 per side, curved outward -->
