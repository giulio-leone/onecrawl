  <path d="M17 20.5 Q12 22 10 23.5" fill="none" stroke="#e0e7ff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M17 22.5 Q13 25 10.5 28" fill="none" stroke="#e0e7ff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right legs -->
  <path d="M23 15.5 Q27 13 29.5 10" fill="none" stroke="#e0e7ff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M23 17.5 Q28 16 30 14.5" fill="none" stroke="#e0e7ff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M23 20.5 Q28 22 30 23.5" fill="none" stroke="#e0e7ff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M23 22.5 Q27 25 29.5 28" fill="none" stroke="#e0e7ff" stroke-width="1.2" stroke-linecap="round"/>
</svg>
